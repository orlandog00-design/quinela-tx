<!-- verificador.html -->
<title>VERIFICADOR | SPORTS KING QUINIELA</title>

<main>
<section class="hero" style="padding: 4rem 1rem;">
    <h1>VERIFICADOR DE QUINIELA</h1>
    <p style="margin-top: 1rem; color: var(--text-muted);">Ingresa tu nombre completo o número de celular para verificar tu registro oficial.</p>
</section>

<section class="form-section">
    <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
        <input type="text" id="verify-search" placeholder="Nombre o Celular..." style="margin-bottom: 0;">
        <button class="btn-primary" id="verify-btn" style="width: auto; padding: 0 2rem;">BUSCAR</button>
    </div>

    <!-- This is where results will be injected -->
    <div id="verify-results" style="display: none; min-height: 200px;">
        <!-- JS will inject results here -->
    </div>
</section>

    <!-- Include the data engine -->
    <script src="assets/js/data-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('verify-search');
            const searchBtn = document.getElementById('verify-btn');
            const resultContainer = document.getElementById('verify-results');

            async function performSearch() {
                const query = searchInput.value.trim().toLowerCase();
                if (!query) return;

                // Show loading state
                resultContainer.innerHTML = '<p style="color: var(--primary-neon); text-align: center;">Buscando registro...</p>';
                resultContainer.style.display = "block";

                const results = await engine.fetchData();
                const participants = results.filter(item => 
                    item.nombre.toLowerCase().includes(query) ||
                    (item.telefono && item.telefono.includes(query)) ||
                    (item.poblacion && item.poblacion.includes(query)) // Ensure both fields are checked
                );

                resultContainer.innerHTML = "";
                if (participants.length > 0) {
                    resultContainer.innerHTML = `<h3 style="color: var(--accent-yellow); margin-bottom: 1.5rem; text-align: center;">Hemos encontrado ${participants.length} registro(s):</h3>`;
                    
                    const gridContainer = document.createElement('div');
                    gridContainer.style.display = "grid";
                    gridContainer.style.gridTemplateColumns = "repeat(auto-fit, minmax(300px, 1fr))";
                    gridContainer.style.gap = "1.5rem";
                    
                    participants.forEach((participant, index) => {
                        const statusClass = participant.status === "PAGADO" ? "status-pagado" : "status-pendiente";
                        const statusText = participant.status || "PENDIENTE";
                        
                        const card = document.createElement('div');
                        card.className = "result-card";
                        card.style.animation = `fadeIn 0.5s ease-out ${index * 0.1}s both`;
                        card.innerHTML = `
                            <div style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 1rem;">
                                <h2 style="color: var(--primary-neon); font-size: 1.4rem;">${participant.nombre}</h2>
                                <p style="color: var(--text-muted); font-size: 0.8rem;">Registro #${index + 1} | J13 Quiniela</p>
                            </div>
                            
                            <div style="margin-bottom: 1.5rem;">
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>

                            <div style="background: rgba(0, 245, 255, 0.05); padding: 1rem; border-radius: 8px; border: 1px solid rgba(0, 245, 255, 0.2);">
                                <p style="color: var(--accent-yellow); font-size: 0.7rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Pronóstico Seleccionado:</p>
                                <p style="font-family: monospace; letter-spacing: 2px; font-size: 1.1rem; color: #fff; word-break: break-all;">${participant.predicciones}</p>
                            </div>
                        `;
                        gridContainer.appendChild(card);
                    });
                    
                    resultContainer.appendChild(gridContainer);
                } else {
                    resultContainer.innerHTML = `
                        <div style="text-align: center; padding: 2rem; color: var(--secondary-magenta);">
                            <p>No se encontró ningún registro para "${query}".</p>
                            <p style="font-size: 0.8rem; margin-top: 1rem; color: var(--text-muted);">Asegúrate de escribir tu nombre tal cual lo registraste.</p>
                        </div>
                    `;
                }
            }

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });
        });
    </script>
</main>
