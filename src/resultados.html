<!-- resultados.html -->
<title>RESULTADOS | LIGA MX JORNADA 13</title>

<main>
<section class="hero" style="padding: 4rem 1rem;">
    <h1>RESULTADOS OFICIALES</h1>
    <h3>LIGA MX | JORNADA 13</h3>
    <p style="margin-top: 1rem; color: var(--text-muted);">Consulta la tabla general y los puntos acumulados de todos los participantes validados.</p>
    <div style="margin-top: 1.5rem; background: rgba(0, 245, 255, 0.1); border: 1px solid var(--primary-neon); padding: 0.8rem; border-radius: 8px; display: inline-block; font-size: 0.85rem; color: var(--primary-neon); font-weight: 700;">
        🕒 NOTA: Resultados actualizados automáticamente cada 15 minutos (Sincronizado con FotMob)
    </div>
</section>

<section class="match-table-container wide-matrix">
    <div style="margin-bottom: 2rem; display: flex; gap: 1rem;">
        <input type="text" id="result-search" placeholder="Buscar por nombre..." style="margin-bottom: 0;">
    </div>

    <div class="matrix-wrapper">
        <table id="results-table">
            <thead>
                <tr id="table-header-row">
                    <th class="sticky-col-rank">POS</th>
                    <th class="sticky-col-name">PARTICIPANTE</th>
                    <!-- Match columns will be injected here -->
                    <th style="text-align: center; min-width: 80px;">PTS</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be injected here by JS -->
            </tbody>
        </table>
    </div>
</section>

    <!-- Include the data engine -->
    <script src="assets/js/data-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.querySelector('#results-table tbody');
            const headerRow = document.getElementById('table-header-row');
            const searchInput = document.getElementById('result-search');

            async function refreshTable(query = "") {
                const results = await engine.fetchData();
                const activeJornada = engine.getActiveJornada();

                if (!results || !activeJornada) {
                    tableBody.innerHTML = '<tr><td colspan="3">Error al cargar datos.</td></tr>';
                    return;
                }

                // Sort results by computed PTS (Highest first)
                results.sort((a, b) => (b.computedPts || 0) - (a.computedPts || 0));

                // 1. Build Match Header
                const existingHeaders = headerRow.querySelectorAll('.match-header-cell');
                existingHeaders.forEach(h => h.remove());

                activeJornada.matches.forEach((match, idx) => {
                    const th = document.createElement('th');
                    th.className = 'match-header-cell';
                    
                    const localLogo = engine.TEAM_LOGOS[match.local] || "";
                    const visitaLogo = engine.TEAM_LOGOS[match.visita] || "";
                    
                    // Display Live Score if available, otherwise VS
                    const liveScore = (engine.liveScores && engine.liveScores[idx]) || "VS";
                    const scoreStyle = liveScore !== "VS" ? 'color: #00ff00; text-shadow: 0 0 5px #00ff00;' : 'color: var(--secondary-magenta);';
                    
                    th.innerHTML = `
                        <div class="logo-pair">
                            <img src="${localLogo}" alt="${match.local}">
                            <span class="vs-text" style="${scoreStyle}">${liveScore}</span>
                            <img src="${visitaLogo}" alt="${match.visita}">
                        </div>
                    `;
                    // Insert before the PTS column
                    headerRow.insertBefore(th, headerRow.lastElementChild);
                });

                // 2. Build rows
                const filtered = engine.search(query);
                tableBody.innerHTML = '';
                
                filtered.forEach((item, index) => {
                    const row = document.createElement('tr');
                    const rank = index + 1;
                    const rankClass = rank === 1 ? 'rank-gold' : '';
                    
                    // Generate individual pick status cells
                    const pickCellsHtml = item.pickStatus.map((status, idx) => {
                        const picks = item.predicciones.split('-');
                        const char = picks[idx] || "?";
                        return `<td style="text-align: center;"><div class="pick-dot ${status}">${char}</div></td>`;
                    }).join('');

                    row.innerHTML = `
                        <td class="sticky-col-rank ${rankClass}">${rank}</td>
                        <td class="sticky-col-name team-name">${item.nombre || "---"}</td>
                        ${pickCellsHtml}
                        <td style="text-align: center; color: var(--secondary-magenta); font-weight: 800; font-size: 1.2rem;">
                            ${item.computedPts || 0}
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }

            // Initial load
            await refreshTable();

            // Search logic
            searchInput.addEventListener('input', async (e) => {
                await refreshTable(e.target.value);
            });
        });
    </script>
</main>
