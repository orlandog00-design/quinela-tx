<!-- index.html -->
<title>SPORTS KING QUINIELA | LIGA MX JORNADA 13</title>

<main>
<section class="hero">
    <img src="assets/img/logo-icon.png" class="hero-logo" alt="Sports King Official Logo">
    <h1>SPORTS KING QUINIELA</h1>
    <h3>LIGA MX | <span id="jornada-display">CARGANDO...</span></h3>
    <div id="countdown">04d 12h 45m 30s</div>
    <p>¡Elige tus ganadores y participa por premios en efectivo!</p>
</section>

<section class="match-table-container">
    <table>
        <thead>
            <tr>
                <th>PARTIDO</th>
                <th>LOCAL</th>
                <th>EMPATE</th>
                <th>VISITANTE</th>
            </tr>
        </thead>
        <tbody id="match-list">
            <!-- Matches will be loaded dynamically by main.js from Google Sheets -->
            <tr>
                <td colspan="4" style="padding: 3rem; text-align: center; color: var(--primary-neon);">
                    <div class="loader">CARGANDO PARTIDOS...</div>
                </td>
            </tr>
        </tbody>
    </table>
</section>

<section id="registro" class="form-section">
    <h2 style="color: var(--primary-neon); margin-bottom: 2rem;">REGISTRA TU QUINIELA</h2>
    <form id="prediction-form">
        <input type="text" placeholder="Nombre completo" required>
        <input type="tel" placeholder="Número de celular" required>
        <div style="margin: 2rem 0; color: var(--accent-yellow); font-weight: 700;">
            COSTO: $10.00 USD
        </div>
        <button type="submit" class="btn-primary">ENVIAR POR WHATSAPP</button>
    </form>
</section>
</main>
