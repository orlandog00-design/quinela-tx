<!-- verificador.html -->
<title>VERIFICADOR | SPORTS KING QUINIELA</title>

<main>
<section class="hero" style="padding: 4rem 1rem;">
    <h1>VERIFICADOR DE QUINIELA</h1>
    <p style="margin-top: 1rem; color: var(--text-muted);">Ingresa tu nombre para verificar el estado oficial de tu registro y pago.</p>
</section>

<section class="form-section">
    <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
        <input type="text" id="verify-search" placeholder="Nombre completo..." style="margin-bottom: 0;">
        <button class="btn-primary" id="verify-btn" style="width: auto; padding: 0 2rem;">BUSCAR</button>
    </div>

    <!-- This is where results will be injected -->
    <div id="verify-results" style="display: none; min-height: 200px;">
        <!-- JS will inject results here -->
    </div>
</section>

    <!-- Include the data engine -->
    <script src="assets/js/data-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('verify-search');
            const searchBtn = document.getElementById('verify-btn');
            const resultContainer = document.getElementById('verify-results');

            async function performSearch() {
                const query = searchInput.value.trim().toLowerCase();
                if (!query) return;

                // Show loading state
                resultContainer.innerHTML = '<p style="color: var(--primary-neon); text-align: center;">Buscando registro...</p>';
                resultContainer.style.display = "block";

                const results = await engine.fetchData();
                const participant = results.find(item => 
                    item.nombre.toLowerCase().includes(query)
                );

                resultContainer.innerHTML = "";
                if (participant) {
                    const statusClass = participant.paymentStatus === "PAGADO" ? "status-pagado" : "status-pendiente";
                    const statusText = participant.paymentStatus || "PENDIENTE";
                    
                    resultContainer.innerHTML = `
                        <div class="result-card" style="animation: fadeIn 0.5s ease-out;">
                            <h2 style="color: var(--primary-neon); margin-bottom: 0.5rem;">${participant.nombre}</h2>
                            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Quiniela J13 Registrada</p>
                            
                            <div style="margin-bottom: 2rem;">
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>

                            <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(0, 245, 255, 0.1);">
                                <p style="color: var(--accent-yellow); font-size: 0.8rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Pronóstico Seleccionado:</p>
                                <p style="font-family: monospace; letter-spacing: 2px; font-size: 1.2rem; color: #fff;">${participant.predicciones}</p>
                            </div>
                        </div>
                    `;
                } else {
                    resultContainer.innerHTML = `
                        <div style="text-align: center; padding: 2rem; color: var(--secondary-magenta);">
                            <p>No se encontró ningún registro para "${query}".</p>
                            <p style="font-size: 0.8rem; margin-top: 1rem; color: var(--text-muted);">Asegúrate de escribir tu nombre tal cual lo registraste.</p>
                        </div>
                    `;
                }
            }

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });
        });
    </script>
</main>
