<!-- resultados.html -->
<title>RESULTADOS | LIGA MX JORNADA 13</title>

<main>
<section class="hero" style="padding: 4rem 1rem;">
    <h1>RESULTADOS OFICIALES</h1>
    <h3>LIGA MX | JORNADA 13</h3>
    <p style="margin-top: 1rem; color: var(--text-muted);">Consulta la tabla general y los puntos acumulados de todos los participantes validados.</p>
</section>

<section class="match-table-container">
    <div style="margin-bottom: 2rem; display: flex; gap: 1rem;">
        <input type="text" id="result-search" placeholder="Buscar por nombre o celular..." style="margin-bottom: 0;">
        <button class="btn-primary" style="width: auto; padding: 0 2rem;">BUSCAR</button>
    </div>

    <table id="results-table">
        <thead>
            <tr>
                <th>PARTICIPANTE</th>
                <th>PREDICCIONES (J13)</th>
                <th style="text-align: center;">PTS</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data will be injected here by JS -->
            <tr id="loading-row">
                <td colspan="3" style="text-align: center; color: var(--primary-neon);">Cargando resultados desde Google Sheets...</td>
            </tr>
        </tbody>
    </table>
</section>

    <!-- Include the data engine -->
    <script src="assets/js/data-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.querySelector('#results-table tbody');
            const searchInput = document.getElementById('result-search');

            async function refreshTable(query = "") {
                const results = await engine.fetchData();
                if (!results) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--secondary-magenta);">Error al conectar con la base de datos.</td></tr>';
                    return;
                }

                const filtered = engine.search(query);
                tableBody.innerHTML = '';
                
                filtered.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="team-name">${item.nombre || "---"}</td>
                        <td style="font-family: monospace; letter-spacing: 1px; color: var(--text-muted);">${item.predicciones || "---"}</td>
                        <td style="text-align: center; color: var(--secondary-magenta); font-weight: 800; font-size: 1.2rem;">${item.pts || "0"}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }

            // Initial load
            await refreshTable();

            // Search logic
            searchInput.addEventListener('input', async (e) => {
                await refreshTable(e.target.value);
            });
        });
    </script>
</main>
